# Runtime channel: authenticated LLM bridge used by the desktop UI (AIWidget).
# This is neither defensive nor offensive — it is the chat ingress that the
# operator uses to converse with the local llama-server. It is allowlisted so
# the gatekeeper does not fail-closed on legitimate UI traffic. Authentication
# is enforced upstream by the Tauri bearer token + llama-server --api-key.
runtime:
  ai_query:
    requires_human: false
    dual_mfa: false
