# ----------------------------------------------------------------------------
#  HispanShield OS — Tool allowlist (single source of truth)
# ----------------------------------------------------------------------------
#
#  This file is the AUTHORITATIVE catalogue of tool names that the LLM may
#  request through the StrictToolRouter. Two consumers must stay in sync:
#
#    - core/rust/aegis-gatekeeper/src/lib.rs   (production, enforcement)
#    - core/sentinel_engine/router/tool_router.py
#        (reference / dev harness — does NOT enforce in production)
#
#  Editing rules:
#    1. Keys are [a-z0-9_]+, max 64 chars (matches the Rust validator).
#    2. `requires_human: true` means the gatekeeper denies auto-execution and
#       asks a human operator.
#    3. `dual_mfa: true` adds the second-operator MFA + state-authorisation
#       gate (Cross-Domain Solution path).
#    4. Anything not listed here is FAIL-CLOSED at the Rust gatekeeper.
#    5. After editing, update aegis-gatekeeper/src/lib.rs::PolicyEngine::new
#       in the same PR. CI cargo-test will fail otherwise (see
#       tests/allowlist_sync.rs once added in Sprint 3).
#
#  See: docs/architecture/ARCHITECTURE_MILITAR.md §"Tool Authorisation Path"
# ----------------------------------------------------------------------------

