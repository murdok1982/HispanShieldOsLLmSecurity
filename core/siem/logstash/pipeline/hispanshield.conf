input {
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    ssl_verify_mode => "peer"
  }
}

filter {
  if [fields][system] == "hispanshield" {
    json {
      source => "message"
    }
    
    # Parse Aegis audit logs
    if [fields][env] == "military" {
      mutate {
        add_field => { "[@metadata][index]" => "hispanshield-audit-%{+YYYY.MM.dd}" }
      }
      
      # Extract severity
      if "BLOQUEADO" in [message] or "DENIED" in [message] {
        mutate { add_field => { "severity" => "HIGH" } }
      } else if "WARNING" in [message] {
        mutate { add_field => { "severity" => "MEDIUM" } }
      } else {
        mutate { add_field => { "severity" => "LOW" } }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    index => "%{[@metadata][index]}"
    user => "${LOGSTASH_USER}"
    password => "${LOGSTASH_PASSWORD}"
    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca.crt"
  }
}
