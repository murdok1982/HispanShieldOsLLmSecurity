input {
  file {
    path => "/var/log/suricata/eve.json"
    codec => json
    tags => ["suricata", "nids"]
    sincedb_path => "/var/lib/logstash/suricata-sincedb"
  }
}

filter {
  if [event_type] == "alert" {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "alerts" }
      add_tag    => ["suricata_alert"]
    }
    # Enrich with HispanShield severity mapping
    if [alert][severity] == 1 {
      mutate { add_field => { "hispanshield_severity" => "critical" } }
    } else if [alert][severity] == 2 {
      mutate { add_field => { "hispanshield_severity" => "high" } }
    } else {
      mutate { add_field => { "hispanshield_severity" => "medium" } }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "events" }
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts    => ["https://127.0.0.1:9200"]
    index    => "hispanshield-suricata-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"
    user     => "${ELASTICSEARCH_USER:logstash_writer}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl_enabled              => true
    ssl_certificate_authorities => ["/certs/ca.crt"]
    ssl_certificate          => "/certs/logstash.crt"
    ssl_key                  => "/certs/logstash.key"
  }
}
