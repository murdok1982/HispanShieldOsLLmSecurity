# ELK Stack Docker Compose for State SOC (On-Premise)
version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - node.name=es-hispanshield-1
      - cluster.name=hispanshield-soc
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.keystore.path=certs/elasticsearch.p12
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.keystore.path=certs/elasticsearch.p12
      - xpack.security.transport.ssl.truststore.path=certs/elasticsearch.p12
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./certs:/usr/share/elasticsearch/config/certs
    ports:
      # Bound exclusively to loopback — never 0.0.0.0 — to prevent access
      # from adjacent hosts in tactical deployments (shared WiFi, LAN).
      - "127.0.0.1:9200:9200"
    environment:
      # Require mTLS from Filebeat/Logstash clients
      - xpack.security.http.ssl.client_authentication=required
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
    networks:
      - hispanshield-soc

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca.crt
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    ports:
      - "127.0.0.1:5601:5601"
    networks:
      - hispanshield-soc
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config:/usr/share/logstash/config
    ports:
      - "127.0.0.1:5044:5044"
      - "127.0.0.1:5000:5000"
    networks:
      - hispanshield-soc
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    volumes:
      - /var/log/hispanshield:/var/log/hispanshield:ro
      - /var/log/audit:/var/log/audit:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml
      - ./certs:/usr/share/filebeat/certs
    networks:
      - hispanshield-soc
    depends_on:
      - logstash

networks:
  hispanshield-soc:
    driver: bridge

volumes:
  es-data:
