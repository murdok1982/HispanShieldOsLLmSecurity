# PAM configuration for HispanShield OS — Military MFA enforcement.
#
# Hardware token (PIV/CAC via pam_pkcs11 OR FIDO2 via pam_u2f) is REQUIRED.
# pam_unix.so is intentionally NOT in the auth stack: passwords cannot satisfy
# authentication for aegis_admin / aegis_agent, even partially. The file
# /etc/hispanshield/pam/u2f_keys MUST be populated with real keys before
# enabling this stack — otherwise login fails closed.
#
# Stack semantics:
#   - pam_faillock pre-auth records attempts even on early failure.
#   - First the PIV/CAC card (pam_pkcs11) is tried. On success, jump past the
#     U2F branch (success=2 skips the next two modules).
#   - If PIV/CAC is not present, fall through to FIDO2 (pam_u2f). On success,
#     skip the trailing pam_deny.so.
#   - Any path that does not produce a hardware-token success ends in pam_deny.

auth        required    pam_faillock.so preauth silent audit deny=3 unlock_time=300
auth        required    pam_usertype.so isregular
auth        required    pam_localuser.so

# Try PIV/CAC first; on success skip the U2F branch and the final deny.
auth        [success=2 default=ignore] pam_pkcs11.so wait_for_card

# Fall back to FIDO2 hardware token. On success, skip the final deny.
auth        [success=1 default=die]    pam_u2f.so authfile=/etc/hispanshield/pam/u2f_keys cue

# Either token succeeded — record post-auth and continue.
auth        required    pam_faillock.so authfail audit deny=3 unlock_time=300

# No hardware token validated; deny.
auth        required    pam_deny.so

# Account verification.
account     required    pam_unix.so
account     required    pam_usertype.so isregular

# Password module is kept only to enforce complexity for emergency console
# changes performed offline by the operator. It is NOT part of the auth flow.
password    required    pam_pwquality.so retry=3 minlen=14 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1
password    required    pam_unix.so sha512 shadow use_authtok

# Session.
session     required    pam_limits.so
session     required    pam_unix.so
session     optional    pam_systemd.so
